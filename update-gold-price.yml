name: Update Gold Price

# ทำงานเป็น cron บนเซิร์ฟเวอร์ของ GitHub (ไม่ใช่ในเบราว์เซอร์ผู้ใช้) จึงไม่มีปัญหา CORS เลย
# ไปดึงราคาทองมาเก็บเป็นไฟล์ gold-price.json ไว้ในรีโปนี้ทุก 30 นาที
# เว็บของเราแค่ fetch ไฟล์นี้จากโดเมนตัวเอง (same-origin) ไม่ต้องพึ่ง CORS proxy ของคนอื่นอีกต่อไป

on:
  schedule:
    - cron: '*/30 * * * *'   # ทุก 30 นาที (เวลาบน GitHub เป็น UTC แต่ไม่มีผลกับ cron แบบนี้)
  workflow_dispatch:          # ให้กดรันมือได้จากแท็บ Actions ด้วย (ใช้ตอนตั้งครั้งแรก)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ดึงราคาทองจาก goldtraders.or.th (ผ่าน community API)
        run: |
          curl -sf https://api.chnwt.dev/thai-gold-api/latest -o gold-price.json
          cat gold-price.json   # โชว์ใน log เผื่อต้องเช็คว่าได้ข้อมูลจริงไหม

      - name: Commit ไฟล์ถ้ามีการเปลี่ยนแปลง
        run: |
          git config user.name "gold-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add gold-price.json
          git diff --cached --quiet || git commit -m "อัปเดตราคาทอง"
          git push
